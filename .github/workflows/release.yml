name: Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Run tests
        run: go test -v -race ./...

  tag:
    name: Create Tag
    needs: test
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Determine new tag version
        id: version
        run: |
          # Get the latest tag that looks like vX.Y.Z
          LATEST_TAG=$(git describe --tags --abbrev=0 --match "v[0-9]*" 2>/dev/null || echo "v0.0.0")
          # Remove the 'v' prefix
          LATEST_TAG_NO_V=${LATEST_TAG#v}
          # Split into major, minor, patch
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_TAG_NO_V"
          # Increment patch
          NEW_PATCH=$((PATCH + 1))
          NEW_TAG="v${MAJOR}.${MINOR}.${NEW_PATCH}"
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "version=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Create tag
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

  build:
    name: Build Binaries
    needs: [test, tag]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # Linux
          - goos: linux
            goarch: amd64
            output: lazytest-linux-amd64
          - goos: linux
            goarch: arm64
            output: lazytest-linux-arm64
          # macOS
          - goos: darwin
            goarch: amd64
            output: lazytest-darwin-amd64
          - goos: darwin
            goarch: arm64
            output: lazytest-darwin-arm64
          # Windows
          - goos: windows
            goarch: amd64
            output: lazytest-windows-amd64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Get version
        id: version
        run: |
          echo "version=${{ needs.tag.outputs.version }}" >> $GITHUB_OUTPUT

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -v -ldflags="-s -w -X main.version=${{ steps.version.outputs.version }}" -o ${{ matrix.output }} ./cmd/lazytest
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip ${{ matrix.output }}.zip ${{ matrix.output }}
            sha256sum ${{ matrix.output }}.zip > ${{ matrix.output }}.zip.sha256
            rm ${{ matrix.output }}
          else
            tar -czf ${{ matrix.output }}.tar.gz ${{ matrix.output }}
            sha256sum ${{ matrix.output }}.tar.gz > ${{ matrix.output }}.tar.gz.sha256
            rm ${{ matrix.output }}
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v3
        with:
          name: ${{ matrix.output }}
          path: |
            ${{ matrix.output }}.*
          retention-days: 7

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Get version
        id: version
        run: |
          echo "version=${{ needs.tag.outputs.version }}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v3
        with:
          path: dist

      - name: Generate changelog
        id: changelog
        run: |
          # Get previous tag (skip latest which is the tag we just created)
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 --match "v[0-9]*" "$(git rev-list --tags --skip=1 --max-count=1)" 2>/dev/null || echo "v0.0.0")
          echo "Previous tag: $PREVIOUS_TAG"
          echo "Current tag: ${{ needs.tag.outputs.tag }}"
          # Get changelog entries
          CHANGELOG=$(git log --pretty=format:"- %s" "$PREVIOUS_TAG..${{ needs.tag.outputs.tag }}" --no-merges)
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="- No changes since last release"
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create/upload release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.tag }}
          name: Release ${{ needs.tag.outputs.tag }}
          body: ${{ steps.changelog.outputs.changelog }}
          path: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}